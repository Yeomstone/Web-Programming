<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>글꼴</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

    <style>
        p{
            font-family: "Roboto Mono", monospace;
            font-size : 36px; /* 글자 크기를 20px로 설정 */
        }
        @font-face {
        font-family: 'Ownglyph_ParkDaHyun';
        src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
        font-weight: normal;
        font-style: normal;
        }   

        h1 {
            font-family: 'Ownglyph_ParkDaHyun', sans-serif;
            font-size: 48px;
        }
        @font-face{
            font-family: 'agro';
            src:url(font/SB_Window_Font/SB\ 어그로\ B.ttf)
        }
        h2 {
            font-family: 'agro';
            font-size: 36px;
        }
    </style>
</head>
<body>
    <h1>글자(font)에 다양한 글꼴(font-family) 적용하기</h1>
    <h2>웹폰트 : 서버에서 폰트를 공유받아 사용</h2>
    <p>- 영문 : https://fonts.google.com</p>
    <p>- 한글 : https://noonnu.cc/</p>
    <h2>font-face 규칙 : 직접 폰트 공유</h2>
    <p>@font-face{
        font-family: '폰트이름';
        src: url('폰트파일경로');
    </p>
</body>
</html>
