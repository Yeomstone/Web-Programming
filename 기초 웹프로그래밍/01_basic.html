<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>제목태그</title>
    <style>
        /* 선택자{속성 : 값}; */
        /* 주석처리는 Ctrl + / */
        h1{
            color : red; /* 제목1의 글자색을 빨간색으로 설정 */
        }
        h4{
            color : rgb(4, 65, 4); /* 제목4의 글자색을 초록색으로 설정 */
        }

    </style>
</head>
<body>
    <h5>
    제목태그 : 해당 태그는 문서의 제목을 나타냄.<br>
    h 뒤에 숫자가 클수록 제목의 크기가 작아짐. <br>
    제목들은 항상 구조적으로(h1태그부터 순서대로) 사용해야함.
    </h5>
    <h1>문서의 제목입니다.</h1>
    <h2>문서의 제목입니다.</h2>
    <h3>문서의 제목입니다.</h3>
    <h4>문서의 제목입니다.</h4>
    <h5>문서의 제목입니다.</h5>
    <h6>문서의 제목입니다.</h6>
</body>
</html>
